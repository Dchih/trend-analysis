services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: product_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_radar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      PRODUCT_RADAR_BIND_ADDR: 0.0.0.0:8080
      PRODUCT_RADAR_DATABASE_URL: postgres://postgres:postgres@postgres:5432/product_radar
      PRODUCT_RADAR_REDIS_URL: redis://redis:6379/0
      PRODUCT_RADAR_REDIS_STREAM: collect_tasks
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.collector
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      PRODUCT_RADAR_DATABASE_URL: dbname=product_radar user=postgres password=postgres host=postgres port=5432
      PRODUCT_RADAR_REDIS_URL: redis://redis:6379/0
      PRODUCT_RADAR_REDIS_STREAM: collect_tasks
      PRODUCT_RADAR_REDIS_GROUP: collector_group
      PRODUCT_RADAR_REDIS_CONSUMER: worker_1
      PRODUCT_RADAR_YOUTUBE_API_KEY: ${PRODUCT_RADAR_YOUTUBE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
